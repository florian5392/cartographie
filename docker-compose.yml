services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: nocodb
      POSTGRES_USER: nocodb
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nocodb_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nocodb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nocodb:
    image: nocodb/nocodb:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NC_DB: "pg://postgres:5432?u=nocodb&p=${POSTGRES_PASSWORD:-nocodb_secret}&d=nocodb"
      NC_AUTH_JWT_SECRET: ${NC_JWT_SECRET:-change_me_in_production}
    ports:
      - "8080:8080"
    volumes:
      - nocodb_data:/usr/app/data
    restart: unless-stopped

  dashboard:
    build: .
    depends_on:
      - nocodb
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  postgres_data:
  nocodb_data:
