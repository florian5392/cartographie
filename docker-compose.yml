# Stack complète Cartographie SI
#
# Sans Cloudflare Tunnel : fonctionne tel quel (réseau cloudflare_tunnel ignoré
# si absent, requiert Docker Compose >= 2.22).
#
# Avec Cloudflare Tunnel : lancez d'abord votre stack cloudflared avec un
# réseau nommé, puis définissez CLOUDFLARE_NETWORK_NAME dans .env :
#
#   Stack cloudflared (autre compose) :
#     networks:
#       tunnel:
#         name: cloudflare_tunnel
#
#   Dans le tunnel Cloudflare (Zero Trust → Tunnels), pointez vers :
#     http://cartographie-dashboard:80

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: cartographie
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  postgrest:
    image: postgrest/postgrest:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI: "postgres://postgres:${POSTGRES_PASSWORD:-changeme}@postgres:5432/cartographie"
      PGRST_DB_SCHEMA: api
      PGRST_DB_ANON_ROLE: web_anon
      PGRST_OPENAPI_SERVER_PROXY_URI: "http://127.0.0.1:3001"
    restart: unless-stopped
    networks:
      - internal

  dashboard:
    image: ghcr.io/florian5392/cartographie:latest
    container_name: cartographie-dashboard
    depends_on:
      - postgrest
    ports:
      - "80:80"
    restart: unless-stopped
    networks:
      - internal
      - cloudflare_tunnel

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge

  cloudflare_tunnel:
    external: true
    required: false
    # Doit correspondre au `name:` déclaré dans la stack cloudflared
    name: ${CLOUDFLARE_NETWORK_NAME:-cloudflare_tunnel}
