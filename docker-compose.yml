services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: cartographie
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgrest:
    image: postgrest/postgrest:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI: "postgres://postgres:${POSTGRES_PASSWORD:-changeme}@postgres:5432/cartographie"
      PGRST_DB_SCHEMA: api
      PGRST_DB_ANON_ROLE: web_anon
      PGRST_OPENAPI_SERVER_PROXY_URI: "http://127.0.0.1:3001"
    ports:
      - "3001:3000"
    restart: unless-stopped

  dashboard:
    image: ghcr.io/florian5392/cartographie:latest
    depends_on:
      - postgrest
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  postgres_data:
